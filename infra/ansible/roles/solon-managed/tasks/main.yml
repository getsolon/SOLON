---
# roles/solon-managed/tasks/main.yml
# Install Solon + Docker + OpenClaw for managed hosting (no NemoClaw/OpenShell/K3s)

# --- System user and directories ---

- name: Create solon group
  ansible.builtin.group:
    name: "{{ solon_group }}"
    system: true
    state: present

- name: Create solon user
  ansible.builtin.user:
    name: "{{ solon_user }}"
    group: "{{ solon_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ solon_data_dir }}"
    create_home: false
    groups: docker
    append: true

- name: Create Solon directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ solon_user }}"
    group: "{{ solon_group }}"
    mode: "0755"
  loop:
    - "{{ solon_install_dir }}"
    - "{{ solon_install_dir }}/bin"
    - "{{ solon_config_dir }}"
    - "{{ solon_data_dir }}"
    - "{{ solon_data_dir }}/logs"

# --- Solon binary ---

- name: Check if Solon is already installed
  ansible.builtin.stat:
    path: "{{ solon_install_dir }}/bin/solon"
  register: solon_binary

- name: Get latest Solon release tag from GitHub
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ solon_github_repo }}/releases/latest"
    return_content: true
    headers:
      Accept: "application/vnd.github.v3+json"
  register: solon_latest_release
  when: solon_version == "latest" and not solon_binary.stat.exists

- name: Set Solon download version
  ansible.builtin.set_fact:
    solon_download_version: >-
      {{ solon_version if solon_version != 'latest'
         else solon_latest_release.json.tag_name }}
  when: not solon_binary.stat.exists

- name: Download Solon binary
  ansible.builtin.get_url:
    url: >-
      https://github.com/{{ solon_github_repo }}/releases/download/{{ solon_download_version }}/solon-linux-{{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}
    dest: "{{ solon_install_dir }}/bin/solon"
    owner: "{{ solon_user }}"
    group: "{{ solon_group }}"
    mode: "0755"
  when: not solon_binary.stat.exists
  notify: restart solon

# --- Solon configuration ---

- name: Deploy Solon configuration
  ansible.builtin.template:
    src: solon-config.yaml.j2
    dest: "{{ solon_config_dir }}/config.yaml"
    owner: "{{ solon_user }}"
    group: "{{ solon_group }}"
    mode: "0640"
  notify: restart solon

# --- Systemd service ---

- name: Deploy Solon systemd service
  ansible.builtin.template:
    src: solon.service.j2
    dest: /etc/systemd/system/solon.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart solon

- name: Enable and start Solon service
  ansible.builtin.systemd:
    name: solon
    enabled: true
    state: started
    daemon_reload: true

# --- Wait for Solon to be ready ---

- name: Wait for Solon to start
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ solon_port }}/api/v1/health"
    status_code: 200
  register: health_check
  retries: 30
  delay: 2
  until: health_check.status == 200

# --- Generate initial admin API key (non-interactive) ---

- name: Check if initial key already exists
  ansible.builtin.stat:
    path: "{{ solon_config_dir }}/initial-key"
  register: initial_key_file

- name: Create initial admin API key
  ansible.builtin.command:
    cmd: "{{ solon_install_dir }}/bin/solon keys create --name managed-admin --scope admin"
  register: solon_key_output
  when: not initial_key_file.stat.exists
  become: true
  become_user: "{{ solon_user }}"

- name: Extract API key from output
  ansible.builtin.set_fact:
    solon_initial_key: "{{ solon_key_output.stdout | regex_search('sol_sk_live_[a-zA-Z0-9_]+') }}"
  when: solon_key_output is changed

- name: Save initial API key
  ansible.builtin.copy:
    content: "{{ solon_initial_key }}"
    dest: "{{ solon_config_dir }}/initial-key"
    owner: root
    group: root
    mode: "0600"
  when: solon_initial_key is defined and solon_initial_key != ""

# --- Docker setup for OpenClaw sandboxes ---

- name: Allow Docker containers to reach Solon
  community.general.ufw:
    rule: allow
    from_ip: 172.16.0.0/12
    to_port: "{{ solon_port }}"
    proto: tcp
    comment: "Solon from Docker sandboxes"

- name: Create solon-bridge Docker network
  ansible.builtin.command:
    cmd: docker network create solon-bridge
  register: docker_network
  failed_when: docker_network.rc != 0 and 'already exists' not in docker_network.stderr
  changed_when: docker_network.rc == 0

- name: Pull OpenClaw sandbox base image
  ansible.builtin.command:
    cmd: docker pull node:22-slim
  changed_when: true

# --- Managed instance marker ---

- name: Create managed instance marker
  ansible.builtin.copy:
    content: |
      managed: true
      provisioned_at: "{{ ansible_date_time.iso8601 }}"
      tier: "{{ tier | default('starter') }}"
    dest: "{{ solon_config_dir }}/managed.yaml"
    owner: "{{ solon_user }}"
    group: "{{ solon_group }}"
    mode: "0644"
