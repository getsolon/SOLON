---
# roles/gpu-inference/handlers/main.yml

- name: restart docker for gpu
  ansible.builtin.systemd:
    name: docker
    state: restarted

- name: restart vllm
  ansible.builtin.command:
    cmd: docker compose restart
    chdir: /opt/vllm
  changed_when: true

- name: restart solon after gpu setup
  ansible.builtin.systemd:
    name: solon
    state: restarted
