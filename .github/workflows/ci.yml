name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package.json

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Cache llama.cpp build
        uses: actions/cache@v4
        with:
          path: third_party/llama-go/build
          key: llamacpp-Linux-x86_64-${{ hashFiles('third_party/llama-go/.git') }}

      - name: Build llama.cpp
        run: make build-llamacpp

      - name: Build dashboard
        run: make build-dashboard

      - name: Verify dashboard build
        run: test -f internal/dashboard/dist/index.html || (echo "Dashboard build missing index.html" && exit 1)

      - name: Test
        run: make test

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10.1

  build:
    needs: test
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - runner: macos-latest
            goos: darwin
            goarch: arm64
          - runner: macos-13
            goos: darwin
            goarch: amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package.json

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake libomp

      - name: Cache llama.cpp build
        uses: actions/cache@v4
        with:
          path: third_party/llama-go/build
          key: llamacpp-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('third_party/llama-go/.git') }}

      - name: Build llama.cpp
        run: make build-llamacpp

      - name: Build dashboard
        run: make build-dashboard

      - name: Build binary
        run: make build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: solon-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/solon

  docker-images:
    needs: test
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push sandbox image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/sandbox.Dockerfile
          push: true
          tags: |
            ghcr.io/theodorthirtyseven37/solon-sandbox:latest
            ghcr.io/theodorthirtyseven37/solon-sandbox:${{ github.sha }}

      - name: Build and push openclaw image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/openclaw.Dockerfile
          push: true
          build-args: |
            BASE_IMAGE=ghcr.io/theodorthirtyseven37/solon-sandbox:latest
          tags: |
            ghcr.io/theodorthirtyseven37/solon-openclaw:latest
            ghcr.io/theodorthirtyseven37/solon-openclaw:${{ github.sha }}

  website:
    needs: test
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build website
        run: cd website && npm install && npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy website/dist --project-name=solon-dev

  cloud-app:
    needs: test
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build dashboard
        run: cd dashboard && npm install && npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dashboard/dist --project-name=solon-cloud

  cloud-api:
    needs: test
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy cloud API
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          workingDirectory: cloud

  install-worker:
    needs: test
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy install worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          workingDirectory: install

  release:
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release binaries
        run: |
          mkdir -p release/
          for dir in artifacts/solon-*/; do
            name=$(basename "$dir")
            cp "$dir/solon" "release/$name"
            chmod +x "release/$name"
          done

      - name: Generate checksums
        run: |
          cd release/
          shasum -a 256 * > checksums.txt
          cat checksums.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            release/*

  update-homebrew:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          # Download checksums
          gh release download "${{ github.ref_name }}" --pattern "checksums.txt" --dir /tmp

          # Extract SHAs per platform
          DARWIN_ARM64_SHA=$(grep "solon-darwin-arm64" /tmp/checksums.txt | awk '{print $1}')
          DARWIN_AMD64_SHA=$(grep "solon-darwin-amd64" /tmp/checksums.txt | awk '{print $1}')
          LINUX_AMD64_SHA=$(grep "solon-linux-amd64" /tmp/checksums.txt | awk '{print $1}')
          LINUX_ARM64_SHA=$(grep "solon-linux-arm64" /tmp/checksums.txt | awk '{print $1}')

          echo "Version: $VERSION"
          echo "Darwin ARM64 SHA: $DARWIN_ARM64_SHA"
          echo "Darwin AMD64 SHA: $DARWIN_AMD64_SHA"
          echo "Linux AMD64 SHA: $LINUX_AMD64_SHA"
          echo "Linux ARM64 SHA: $LINUX_ARM64_SHA"

          # Update formula in-repo (tap repo sync is manual for now)
          sed -i "s/version \".*\"/version \"$VERSION\"/" homebrew/solon.rb

          # Update SHAs — match each platform block
          # Darwin ARM64
          sed -i "/solon-darwin-arm64/{n;s/sha256 \".*\"/sha256 \"$DARWIN_ARM64_SHA\"/}" homebrew/solon.rb
          # Darwin AMD64
          sed -i "/solon-darwin-amd64/{n;s/sha256 \".*\"/sha256 \"$DARWIN_AMD64_SHA\"/}" homebrew/solon.rb
          # Linux ARM64
          sed -i "/solon-linux-arm64/{n;s/sha256 \".*\"/sha256 \"$LINUX_ARM64_SHA\"/}" homebrew/solon.rb
          # Linux AMD64
          sed -i "/solon-linux-amd64/{n;s/sha256 \".*\"/sha256 \"$LINUX_AMD64_SHA\"/}" homebrew/solon.rb

          echo "Updated homebrew/solon.rb:"
          cat homebrew/solon.rb

  smoke-test:
    needs: build
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            artifact: solon-linux-amd64
          - runner: macos-latest
            artifact: solon-darwin-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: bin/

      - name: Run smoke test
        run: |
          chmod +x bin/solon
          ./scripts/smoke-test.sh bin/solon

  test-install:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Test install script
        run: |
          # Verify script is valid shell
          bash -n website/public/install.sh
          echo "Install script syntax OK"
