name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package.json

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Cache llama.cpp build
        uses: actions/cache@v4
        with:
          path: third_party/llama-go/build
          key: llamacpp-Linux-x86_64-${{ hashFiles('third_party/llama-go/.git') }}

      - name: Build llama.cpp
        run: make build-llamacpp

      - name: Build dashboard
        run: make build-dashboard

      - name: Verify dashboard build
        run: test -f internal/dashboard/dist/index.html || (echo "Dashboard build missing index.html" && exit 1)

      - name: Test
        run: make test

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10.1

  build:
    needs: test
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - runner: macos-latest
            goos: darwin
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package.json

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake libomp

      - name: Cache llama.cpp build
        uses: actions/cache@v4
        with:
          path: third_party/llama-go/build
          key: llamacpp-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('third_party/llama-go/.git') }}

      - name: Build llama.cpp
        run: make build-llamacpp

      - name: Build dashboard
        run: make build-dashboard

      - name: Build binary
        run: make build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: solon-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/solon

  website:
    needs: test
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build website
        run: cd website && npm install && npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy website/dist --project-name=solon-dev

  hosting:
    needs: test
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: hosting

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: hosting

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: hosting

  install-worker:
    needs: test
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy install worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          workingDirectory: install

  release:
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release binaries
        run: |
          mkdir -p release/
          for dir in artifacts/solon-*/; do
            name=$(basename "$dir")
            cp "$dir/solon" "release/$name"
            chmod +x "release/$name"
          done

      - name: Generate checksums
        run: |
          cd release/
          shasum -a 256 * > checksums.txt
          cat checksums.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            release/*

  update-homebrew:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          # Download checksums
          gh release download "${{ github.ref_name }}" --pattern "checksums.txt" --dir /tmp

          # Extract SHA for darwin-arm64
          DARWIN_SHA=$(grep "solon-darwin-arm64" /tmp/checksums.txt | awk '{print $1}')
          LINUX_AMD64_SHA=$(grep "solon-linux-amd64" /tmp/checksums.txt | awk '{print $1}')
          LINUX_ARM64_SHA=$(grep "solon-linux-arm64" /tmp/checksums.txt | awk '{print $1}')

          echo "Version: $VERSION"
          echo "Darwin ARM64 SHA: $DARWIN_SHA"
          echo "Linux AMD64 SHA: $LINUX_AMD64_SHA"
          echo "Linux ARM64 SHA: $LINUX_ARM64_SHA"

  test-install:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Test install script
        run: |
          # Verify script is valid shell
          bash -n website/public/install.sh
          echo "Install script syntax OK"
